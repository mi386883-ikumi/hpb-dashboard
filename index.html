      for(let m=1;m<=12;m++){
        const name=`日報 ${year}${String(m).padStart(2,'0')}`;
        if(!titles.includes(name))continue;
        ranges.push(`'${name}'!B38:N38`);ranges.push(`'${name}'!A3:N33`);ranges.push(`'${name}'!AA38`);
        monthMap.push({month:MO[m-1],m});
      }
      // 「日報」シート（当月分）— 4レンジ：probe+summary+daily+sales
      let nippoIdx=-1;
      if(titles.includes('日報')&&year===new Date().getFullYear()){
        ranges.push(`'日報'!A3`);ranges.push(`'日報'!B38:N38`);ranges.push(`'日報'!A3:N33`);ranges.push(`'日報'!AA38`);
        nippoIdx=monthMap.length;
      }
      if(ranges.length===0)continue;
      // 2) batchGet で一括取得（年あたり1コール）
      const params=ranges.map(r=>`ranges=${encodeURIComponent(r)}`).join('&');
      const batchRes=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${s.id}/values:batchGet?key=${apiKey}&${params}`);
      if(!batchRes.ok)continue;
      const vrs=(await batchRes.json()).valueRanges||[];
      const fetchedMs=new Set();
      function parseSalesCell(vr){const raw=vr?.values?.[0]?.[0];return parseInt(String(raw||'').replace(/[¥￥,\s]/g,''))||0;}
      // 名前付きシートを処理（各3レンジ：summary+daily+sales）
      for(let i=0;i<monthMap.length;i++){
        const sv=vrs[i*3]?.values?.[0];
        if(sv){const v=sv.map(x=>parseInt(String(x).replace(/,/g,''))||0);const sales=parseSalesCell(vrs[i*3+2]);data.monthly.push({month:monthMap[i].month,sales,...parseRow38(v)});fetchedMs.add(monthMap[i].m);}
        const dv=vrs[i*3+1]?.values;
        if(dv)data.daily[monthMap[i].month]=parseDailyRows(dv);
      }
      // 「日報」シートを処理（4レンジ：probe+summary+daily+sales）
      if(nippoIdx>=0){
        const base=nippoIdx*3;
        const probeVal=vrs[base]?.values?.[0]?.[0]?.toString()||'';
        const mm=probeVal.match(/^(\d{1,2})\//);
        if(mm){
          const curM=parseInt(mm[1]);
          if(!fetchedMs.has(curM)){
            const sv=vrs[base+1]?.values?.[0];
            if(sv){const v=sv.map(x=>parseInt(String(x).replace(/,/g,''))||0);const sales=parseSalesCell(vrs[base+3]);data.monthly.push({month:MO[curM-1],sales,...parseRow38(v)});}
            const dv=vrs[base+2]?.values;
            if(dv)data.daily[MO[curM-1]]=parseDailyRows(dv);
          }
        }
      }
      data.monthly.sort((a,b)=>MO.indexOf(a.month)-MO.indexOf(b.month));
      if(data.monthly.length>0)result[year]=data;
    }
    return Object.keys(result).length>0?result:null;
  }catch(e){console.error('fetchStore error:',e);return null;}
}

function renderInsight(el){
  const curY=curProdYear,curM=curProdMonth;
  const midx=MO.indexOf(curM);
  const prevM=midx>0?MO[midx-1]:'12月';
  const prevY=midx>0?curY:curY-1;

  // スタッフデータ収集
  const allStaff=[];
  const byStore={};
  STAFF_LIST.forEach(g=>{
    if(!g.staff.length)return;
    g.staff.forEach(name=>{
      const cur=staffProdData?.[g.store]?.[name]?.[curY+'年']?.[curM]||{};
      const prev=staffProdData?.[g.store]?.[name]?.[prevY+'年']?.[prevM]||{};
      const ci=stores.findIndex(s=>s.name===g.store);
      const color=ci>=0?SC[ci%SC.length]:'#7D8CA1';
      const d={store:g.store,name,color,cur,prev};
      allStaff.push(d);
      if(!byStore[g.store])byStore[g.store]=[];
      byStore[g.store].push(d);
    });
  });

  // 1. 口コミ0件スタッフ
  const lowReview=allStaff.filter(s=>{
    if(!Object.keys(s.cur).length)return false;
    const hs=hpbStatsByStore[s.store];
    return(s.cur.hpR??0)===0||((!hs?.noHpb)&&(s.cur.hpbR??0)===0);
  });

  // 2. 退会率10%以上の店舗（退会率 = 退会数/会員数×100）
  const storeCancels=Object.entries(byStore).map(([store,list])=>{
    const cancel=list.reduce((a,s)=>a+(s.cur.cancel??0),0);
    const members=list.reduce((a,s)=>a+(s.cur.members??0),0);
    const hasData=list.some(s=>s.cur.cancel!=null&&s.cur.members!=null);
    const rate=members>0?(cancel/members*100):null;
    const ci=stores.findIndex(s=>s.name===store);
    return{store,cancel,members,rate,hasData,color:ci>=0?SC[ci%SC.length]:'#7D8CA1'};
  }).filter(d=>d.hasData&&d.rate!=null);
  const highCancel=storeCancels.filter(d=>d.rate>=10).sort((a,b)=>b.rate-a.rate);

  // 3. 売上の低下トレンド
  const trendDown=[];
  allStaff.forEach(s=>{
    const cp=s.cur.prod,pp=s.prev.prod;
    if(cp!=null&&pp!=null&&pp>0&&(cp-pp)/pp<-0.15)
      trendDown.push({...s,change:((cp-pp)/pp*100).toFixed(0),curVal:cp,prevVal:pp});
  });
  trendDown.sort((a,b)=>a.change-b.change);

  // 4. スタッフ間成績差
  const gapData=Object.entries(byStore).map(([store,list])=>{
    const wp=list.filter(s=>s.cur.prod!=null&&s.cur.prod>0);
    if(wp.length<2)return null;
    wp.sort((a,b)=>b.cur.prod-a.cur.prod);
    const top=wp[0],bot=wp[wp.length-1];
    const ratio=top.cur.prod/bot.cur.prod;
    const ci=stores.findIndex(s=>s.name===store);
    return{store,top,bot,ratio,color:ci>=0?SC[ci%SC.length]:'#7D8CA1'};
  }).filter(d=>d&&d.ratio>1.5).sort((a,b)=>b.ratio-a.ratio);

const urgentCount=lowReview.length+highCancel.length;
  const warnCount=trendDown.length+gapData.length;

  const mkRow=(icon,title,detail,action,sev)=>{
    const sc=sev==='urgent'?'#FF6B4A':sev==='warn'?'#F0C846':'#34D399';
    const sb=sev==='urgent'?'rgba(255,107,74,0.12)':sev==='warn'?'rgba(240,200,70,0.12)':'rgba(52,211,153,0.12)';
    const sl=sev==='urgent'?'要対応':sev==='warn'?'注意':'良好';
    return`<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)">
      <span style="font-size:15px;flex-shrink:0;margin-top:2px">${icon}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;color:#E6EDF3;margin-bottom:2px">${title}</div>
        <div style="font-size:11px;color:var(--txm)">${detail}</div>
        ${action?`<div style="font-size:10px;color:${sc};margin-top:4px;font-weight:600">→ ${action}</div>`:''}
      </div>
      <span style="background:${sb};color:${sc};font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0;white-space:nowrap">${sl}</span>
    </div>`;
  };

  const reviewHtml=lowReview.length===0
    ?mkRow('✅','口コミ獲得 — 全スタッフ問題なし',`${curY}年${curM}は全スタッフがGoogle・HPB口コミを獲得しています`,'','ok')
    :lowReview.map(s=>{
      const gv=s.cur.hpR??0,hv=s.cur.hpbR??0;
      const hs=hpbStatsByStore[s.store];
      const issues=[];
      if(gv===0)issues.push('Google口コミ 0件');
      if(!hs?.noHpb&&hv===0)issues.push('HPB口コミ 0件');
      return mkRow('💬',`${s.name}（${s.store.replace('院','')}）— ${issues.join(' / ')}`,`${curY}年${curM} 口コミ獲得数がゼロです`,'施術後のレビュー依頼を徹底してください','urgent');
    }).join('');

  const cancelHtml=highCancel.length===0
    ?mkRow('✅','退会率 — 全店舗10%未満','全店舗の退会率（退会数÷会員数）は10%以内に収まっています','','ok')
    :highCancel.map(d=>{
      return mkRow('🚨',`${d.store} — 退会率 ${d.rate.toFixed(1)}%`,`退会数 ${d.cancel}名 ／ 会員数 ${d.members}名`,'退会理由のヒアリングとフォロー面談を実施してください','urgent');
    }).join('');

  const trendHtml=trendDown.length===0
    ?mkRow('✅','売上トレンド — 大きな低下なし','前月比で15%以上の低下は検知されていません','','ok')
    :trendDown.map(d=>{
      const cf='¥'+Number(d.curVal).toLocaleString();
      const pf='¥'+Number(d.prevVal).toLocaleString();
      return mkRow('📉',`${d.name}（${d.store.replace('院','')}）— 売上 ${d.change}%低下`,`${prevM} ${pf} → ${curM} ${cf}`,'売上回復のため個別面談・目標設定を行ってください','warn');
    }).join('');

const gapHtml=gapData.length===0
    ?mkRow('✅','スタッフ間成績差 — 問題なし','各店舗内の売上格差は許容範囲（1.5倍以内）に収まっています','','ok')
    :gapData.map(d=>{
      const tf='¥'+Number(d.top.cur.prod).toLocaleString();
      const bf='¥'+Number(d.bot.cur.prod).toLocaleString();
      return mkRow('⚖️',`${d.store} — スタッフ間売上差 ${d.ratio.toFixed(1)}倍`,`最高: ${d.top.name} ${tf} ／ 最低: ${d.bot.name} ${bf}`,'低パフォーマンスのスタッフへの技術・接客指導を検討してください','warn');
    }).join('');

  el.innerHTML=`<div class="fade">
    <div class="ph">
      <div><div class="pt"><span style="color:#34D399">🤖</span> AIインサイト</div><div class="pd">ルールベース自動分析 — ${curY}年 ${curM}</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="mp" style="margin:0">${[2025,2026].map(y=>`<button class="pl ${curProdYear===y?'on':''}" onclick="curProdYear=${y};renderMain()">${y}年</button>`).join('')}</div>
        <div class="mp" style="margin:0">${MO.map(m=>`<button class="pl ${curProdMonth===m?'on':''}" onclick="curProdMonth='${m}';renderMain()">${m}</button>`).join('')}</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      ${urgentCount>0?`<span style="background:rgba(255,107,74,0.15);color:#FF6B4A;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px">🔴 要対応 ${urgentCount}件</span>`:''}
      ${warnCount>0?`<span style="background:rgba(240,200,70,0.15);color:#F0C846;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px">🟡 注意 ${warnCount}件</span>`:''}
      <span style="background:rgba(52,211,153,0.15);color:#34D399;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px">🟢 ${urgentCount===0&&warnCount===0?'全項目 良好':'その他 良好'}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="cd">
        <div class="ct"><span class="cdot" style="background:#F472B6"></span>💬 口コミ獲得状況</div>
        <div class="csu">${curY}年${curM} — 0件スタッフを検知</div>
        <div>${reviewHtml}</div>
      </div>
      <div class="cd">
        <div class="ct"><span class="cdot" style="background:#FF6B4A"></span>🚨 退会率アラート</div>
        <div class="csu">${curY}年${curM} — 退会率10%以上（退会数÷会員数×100）を検知</div>
        <div>${cancelHtml}</div>
      </div>
      <div class="cd">
        <div class="ct"><span class="cdot" style="background:#38BDF8"></span>📉 売上・入会率トレンド</div>
        <div class="csu">前月比 -15%以上（売上）/ -20%以上（入会率）を検知</div>
        <div>${trendHtml}</div>
      </div>
      <div class="cd">
        <div class="ct"><span class="cdot" style="background:#F0C846"></span>⚖️ スタッフ間成績差</div>
        <div class="csu">${curY}年${curM} — 店舗内最高/最低比 1.5倍以上を検知</div>
        <div>${gapHtml}</div>
      </div>

    </div>
  </div>`;
}

function editRating(storeName){
  if(!hpbStatsByStore[storeName])return;
  const hs=hpbStatsByStore[storeName];
  const val=prompt(`「${storeName}」の口コミ評価（★）を入力してください：`,hs.rating||0);
  if(val===null)return;
  const num=parseFloat(val);
  if(isNaN(num)||num<0||num>5){alert('0〜5.0の範囲で入力してください');return;}
  hs.rating=Math.round(num*100)/100;
  try{localStorage.setItem('hpb_dashboard_config',JSON.stringify({stores,apiKey,hpbStatsByStore}));}catch(e){}
  renderMain();
}
function editReviewCount(storeName){
  if(!hpbStatsByStore[storeName])return;
  const hs=hpbStatsByStore[storeName];
  const val=prompt(`「${storeName}」の口コミ数を入力してください：`,hs.reviews||0);
  if(val===null)return;
  const num=parseInt(val);
  if(isNaN(num)||num<0){alert('正しい数字を入力してください');return;}
  if(hs.reviewsPrev==null)hs.reviewsPrev=hs.reviews||0;
  hs.reviews=num;
  try{localStorage.setItem('hpb_dashboard_config',JSON.stringify({stores,apiKey,hpbStatsByStore}));}catch(e){}
  renderMain();
}
function adjReview(storeName,delta){
  if(!hpbStatsByStore[storeName])return;
  const hs=hpbStatsByStore[storeName];
  if(hs.reviewsPrev==null)hs.reviewsPrev=hs.reviews||0;
  hs.reviews=Math.max(0,(hs.reviews||0)+delta);
  try{localStorage.setItem('hpb_dashboard_config',JSON.stringify({stores,apiKey,hpbStatsByStore}));}catch(e){}
  renderMain();
}
function resetMonthlyReviews(storeName){

// KPI card config: key, label, description, color
const KPI_CH=[
  {k:'HPB',label:'HPB',desc:'ホットペッパー',color:'#FF6B4A'},
  {k:'HP',label:'HP',desc:'HP+MEO+Gマップ',color:'#3ECFB4'},
  {k:'チラシ',label:'チラシ',desc:'チラシ経由',color:'#F0C846'},
  {k:'メタ広告',label:'メタ広告',desc:'Meta広告経由',color:'#8B7CF6'},
  {k:'紹介',label:'紹介',desc:'紹介経由',color:'#F472B6'}
];
function buildKpiCards(monthlyArr,totalAll,prefix){
  let h='';
  KPI_CH.forEach(ch=>{
    const t=monthlyArr.reduce((s,m)=>s+(m[ch.k]||0),0);
    const avg=monthlyArr.length?(t/monthlyArr.length).toFixed(1):'0';
    const pct=totalAll?((t/totalAll)*100).toFixed(1)+'%':'—';
    h+=`<div class="kp" style="--kc:${ch.color}"><div class="kl">${ch.label} ${prefix}</div><div class="kv" style="color:${ch.color}">${t}<span style="font-size:13px;color:var(--txm);margin-left:6px">(${pct})</span></div><div class="kn">${ch.desc}｜月平均 ${avg}人</div></div>`;
  });
  h+=`<div class="kp" style="--kc:var(--em)"><div class="kl">全経路 ${prefix}</div><div class="kv" style="color:var(--em)">${totalAll}</div><div class="kn">新規来院者総数</div></div>`;
  return h;
}
function reviewRatingRankAll(){
  const ranked=stores.map(s=>({name:s.name,rating:parseFloat((hpbStatsByStore[s.name]||{}).rating)||0,reviews:(hpbStatsByStore[s.name]||{}).reviews||0})).sort((a,b)=>b.rating-a.rating);
  const medals=['🥇','🥈','🥉'];
  const storeColors=['#FF6B4A','#3ECFB4','#F0C846','#8B7CF6','#F472B6','#38BDF8','#FBBF24','#A3E635'];
  // スコアバーは4.5〜5.0のレンジで表示（差が見やすいよう）
  const minR=4.5,maxR=5.0;
  return ranked.map((r,i)=>{
    const pct=Math.max(Math.min((r.rating-minR)/(maxR-minR)*100,100),4);
    const col=storeColors[i%storeColors.length];
    const medal=i<3?medals[i]:`<span style="font-size:11px;font-weight:700;color:var(--txd);width:20px;display:inline-block;text-align:center">${i+1}</span>`;
    const stars='★'.repeat(Math.floor(r.rating))+(r.rating%1>=0.5?'½':'');
    return `<div class="ri" style="align-items:center;padding:6px 0;border-bottom:1px solid var(--bd)">
      <span style="font-size:${i<3?'16':'13'}px;width:24px;text-align:center;flex-shrink:0">${medal}</span>
      <span style="font-size:12px;font-weight:600;width:80px;flex-shrink:0;color:var(--tx)">${r.name}</span>
      <div style="flex:1;position:relative;height:22px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden">
        <div style="position:absolute;left:0;top:0;height:100%;width:${pct}%;background:${col}22;border-radius:4px;transition:width .4s ease"></div>
        <div style="position:absolute;left:0;top:0;height:100%;width:${pct}%;background:${col}55;clip-path:inset(0 0 0 0);border-right:2px solid ${col};border-radius:4px"></div>
        <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:${col}">★${r.rating.toFixed(2)}</span>
      </div>
      <span style="font-size:10px;color:var(--txd);width:48px;text-align:right;flex-shrink:0">${r.reviews}件</span>
    </div>`;
  }).join('');
}
function rankMedal(i){return i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span style="font-size:11px;font-weight:700;color:var(--txd);display:inline-block;width:20px;text-align:center">${i+1}</span>`;}
function rankCol(i){const c=['#FF6B4A','#3ECFB4','#F0C846','#8B7CF6','#F472B6','#38BDF8','#FBBF24','#A3E635','#6EE7B7','#FCA5A5'];return c[i%c.length];}
function hpbRank(key,unit,top){
  const ranked=stores.map(s=>({name:s.name,val:(hpbStatsByStore[s.name]||{})[key]||0})).sort((a,b)=>b.val-a.val).slice(0,top||3);
  const max=ranked[0]?.val||1;
  return ranked.map((r,i)=>`<div class="ri"><span style="font-size:${i<3?'14':'11'}px;width:20px;text-align:center;flex-shrink:0">${rankMedal(i)}</span><span class="rn" style="font-size:12px;font-weight:600">${r.name}</span><div class="rbt"><div class="rb" style="width:${Math.max(r.val/max*100,12)}%;background:${rankCol(i)}30;color:${rankCol(i)};font-size:11px">${r.val}${unit}</div></div></div>`).join('');
}
function blogFreqRank(top){
  const ranked=stores.map(s=>({name:s.name,freq:(hpbStatsByStore[s.name]||{}).blogFreqDays||99})).sort((a,b)=>a.freq-b.freq).slice(0,top||3);
  const min=ranked[0]?.freq||1;
  return ranked.map((r,i)=>{
    const lbl=r.freq<=1?'毎日':r.freq===2?'2日に1回':r.freq===3?'3日に1回':`${r.freq}日に1回`;
    const pct=Math.max(min/r.freq*100,12);
    return `<div class="ri"><span style="font-size:${i<3?'14':'11'}px;width:20px;text-align:center;flex-shrink:0">${rankMedal(i)}</span><span class="rn" style="font-size:12px;font-weight:600">${r.name}</span><div class="rbt"><div class="rb" style="width:${pct}%;background:${rankCol(i)}30;color:${rankCol(i)};font-size:11px">${lbl}</div></div></div>`;
  }).join('');
}

function renderHpbTable(monthly){
  const el=document.getElementById('hpbTbl');if(!el)return;
  let h=`<table><thead><tr><th>月</th><th>HPB来店数</th><th>前月比</th><th>累計</th></tr></thead><tbody>`;
  let cum=0;
  monthly.forEach((x,i)=>{
    cum+=x.hpb;
    const prev=i>0?monthly[i-1].hpb:null;
    let diff='—',dc='var(--txm)';
    if(prev!==null){const d=x.hpb-prev;diff=(d>=0?'+':'')+d;dc=d>0?'var(--em)':d<0?'var(--rs)':'var(--txm)';}
    h+=`<tr><td style="font-weight:600">${x.month}</td><td class="hl">${x.hpb}</td><td style="color:${dc};font-weight:600">${diff}</td><td style="color:var(--txm)">${cum}</td></tr>`;
  });
  const tot=monthly.reduce((s,x)=>s+x.hpb,0);
  h+=`<tr class="rws"><td colspan="2">合計</td><td></td><td class="hl">${tot}</td></tr>`;
  h+=`</tbody></table>`;
  el.innerHTML=h;
}

    ${prodDataLoading?'<div class="stb"><span class="sd lv"></span>スプレッドシートからデータを取得しています…</div>':''}
    ${rankingSection}
    ${storeCards}
  </div>`;
}
function initProductivityCharts(){
  Object.keys(expandedStaff).forEach(key=>{
    if(!expandedStaff[key])return;
    const sep=key.indexOf('|');
    const store=key.slice(0,sep);const name=key.slice(sep+1);
    const cid='sc-'+sanitizeId(store)+'-'+sanitizeId(name);
    if(!document.getElementById(cid)||charts[cid])return;
    const labels=[];
    [2025,2026].forEach(y=>MO.forEach(m=>labels.push(y+'/'+m)));
    const datasets=PROD_METRICS.map(metric=>({
      label:metric.label,
      data:[2025,2026].flatMap(y=>MO.map(m=>{const v=staffProdData?.[store]?.[name]?.[y+'年']?.[m]?.[metric.key];return v!=null?metric.scale(v):null;})),
      borderColor:metric.color,backgroundColor:'transparent',borderWidth:2,
      pointRadius:3,pointBackgroundColor:metric.color,tension:.35,spanGaps:true
    }));
    mkLine(cid,labels,datasets);
  });
}

// ===== 今月受付データ取得 =====
async function fetchCurrentMonthReception(btn){
  if(btn){btn.disabled=true;btn.textContent='取得中…';}
  const y=curProdYear; const m=curProdMonth;
  const mm=String(MO.indexOf(m)+1).padStart(2,'0');
  const yyyymm=`${y}${mm}`;
  let done=0;
  const stores=Object.keys(receptionFolders);
  for(const storeName of stores){
    const cacheKey=`${storeName}|${y}|${m}`;
    const folderId=receptionFolders[storeName];
    const sheetId=await getFolderFileId(folderId,yyyymm);
    if(!sheetId){done++;continue;}
    try{
      const url=`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/A3:U1000?key=${apiKey}`;
      const res=await fetch(url);
      const data=await res.json();
      if(data.values&&data.values.length>0){
        receptionCache[cacheKey]=parseReceptionRows(data.values);
        try{
          const ex=JSON.parse(localStorage.getItem('hpb_reception_cache')||'{}');
          ex[cacheKey]={data:receptionCache[cacheKey],ts:Date.now()};
          localStorage.setItem('hpb_reception_cache',JSON.stringify(ex));
        }catch(e){}
      }
    }catch(e){}
    done++;
  }
  if(btn){btn.disabled=false;btn.textContent='📥 今月データ取得';}
  renderMain();
  showToast(`✅ ${y}年${m}のデータを取得しました`,'#34D399');
}
// ===== 受付履歴 フォルダ→ファイルID解決 =====
async function getFolderFileId(folderId,yyyymm){
  if(!folderFileLists[folderId]){
    try{
      const url=`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents&key=${apiKey}&fields=files(id,name)&pageSize=200`;
      const res=await fetch(url);
      const data=await res.json();
      const map={};(data.files||[]).forEach(f=>map[f.name]=f.id);
      folderFileLists[folderId]=map;
      try{localStorage.setItem('hpb_folder_lists',JSON.stringify(folderFileLists));}catch(e){}
    }catch(e){return null;}
  }
  return folderFileLists[folderId]?.[yyyymm]||null;
}
// ===== 受付履歴 データパーサー =====
function parseReceptionRows(rows){
  const staffMap={};
  rows.forEach(row=>{
    const staff=(row[7]||'').trim();
    if(!staff)return;
    const salesStr=(row[14]||'').replace(/[,¥￥\s]/g,'');
    const sales=parseInt(salesStr)||0;
    if(sales<=0)return;
    const isNew=(row[20]||'').trim()==='新患';
    const lCol=(row[11]||'').trim();
    const countMember=lCol!==''&&lCol!=='楽トレ';
    if(!staffMap[staff])staffMap[staff]={total:0,newSales:0,count:0,newCount:0};
    staffMap[staff].total+=sales;
    if(countMember)staffMap[staff].count++;
    if(isNew){staffMap[staff].newSales+=sales;staffMap[staff].newCount++;}
  });
  return Object.entries(staffMap).map(([name,d])=>({
    name,total:d.total,newSales:d.newSales,contSales:d.total-d.newSales,
    count:d.count,newCount:d.newCount,
    rate:d.count>0?Math.round(d.newCount/d.count*1000)/10:0
  })).sort((a,b)=>b.total-a.total);
}

function closeSettings(){document.getElementById('settingsModal').classList.remove('show');}
function renderStoreEdit(){const el=document.getElementById('storeListEdit');el.innerHTML=stores.map((s,i)=>`<div class="se-row"><input class="fi se-nm" value="${s.name}" data-idx="${i}" placeholder="店舗名" /><input class="fi" value="${s.id}" data-idx="${i}" placeholder="スプレッドシートID" /><button class="del-b" onclick="delStore(${i})">削除</button></div>`).join('');}
function addStoreRow(){stores.push({name:'',id:''});renderStoreEdit();}
function delStore(i){if(stores.length<=1)return;stores.splice(i,1);storeData={};liveStores.clear();renderStoreEdit();}
function saveSettings(){apiKey=document.getElementById('mApiKey').value.trim();gasEndpoint=document.getElementById('mGasEndpoint').value.trim();document.querySelectorAll('.se-row').forEach(row=>{const inputs=row.querySelectorAll('input');const idx=parseInt(inputs[0].dataset.idx);if(stores[idx]){stores[idx].name=inputs[0].value.trim();stores[idx].id=inputs[1].value.trim();}});try{localStorage.setItem('hpb_dashboard_config',JSON.stringify({stores,apiKey,hpbStatsByStore,gasEndpoint}));}catch(e){}fetchAllStores();}
async function fetchHpbData(btn){
  if(!gasEndpoint){alert('GASエンドポイントURLが設定されていません。\n⚙ 店舗管理・API設定 から入力してください。');return;}
  if(btn){btn.disabled=true;btn.textContent='取得中…';}
  const today=new Date().toISOString().slice(0,10);
  let ok=0,ng=0;
  for(const s of stores){
    const hs=hpbStatsByStore[s.name];
    if(!hs||!hs.salonUrl)continue;
    const m=hs.salonUrl.match(/\/(sln[A-Z0-9]+)\//i);
    if(!m)continue;
    try{
      const res=await fetch(gasEndpoint+'?salonId='+m[1]);
      if(!res.ok){ng++;continue;}
      const d=await res.json();
      if(d.reviews!=null)hs.reviews=d.reviews;
      if(d.rating!=null)hs.rating=d.rating;
      if(d.blogs!=null)hs.blogs=d.blogs;
      hs.lastUpdated=today;ok++;
    }catch(e){ng++;}
  }
  try{localStorage.setItem('hpb_dashboard_config',JSON.stringify({stores,apiKey,hpbStatsByStore,gasEndpoint}));}catch(e){}
  if(btn){btn.disabled=false;btn.textContent='HPBデータ自動取得';}
  showToast('✅ '+ok+'店舗のHPBデータを更新しました'+(ng>0?' ('+ng+'件エラー)':''),'#34D399');
  renderMain();
}
async function refreshData(btn){if(btn){btn.disabled=true;btn.textContent='更新中…';}storeData={};liveStores.clear();await fetchAllStores();if(btn){btn.disabled=false;btn.textContent='↺ 手動更新';}}

renderSidebar();renderMain();

if(stores.some(s=>s.id)&&apiKey){setTimeout(()=>{const el=document.getElementById('mainC');el.innerHTML='<div class="fade" style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px"><div style="width:24px;height:24px;border:2px solid var(--bd);border-top:2px solid var(--ac);border-radius:50%;animation:spin .8s linear infinite"></div><div style="color:var(--txm);font-size:13px">スプレッドシートからデータを取得中…</div></div>';fetchAllStores();},300);}
